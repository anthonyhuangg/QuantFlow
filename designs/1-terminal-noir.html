<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantFlow - Design 1: Terminal Noir</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050505;
    --panel: #0a0a0a;
    --green: #00ff41;
    --green-dim: #00cc33;
    --green-glow: rgba(0, 255, 65, 0.15);
    --red: #ff3333;
    --red-glow: rgba(255, 51, 51, 0.15);
    --text: #b0b0b0;
    --muted: #555;
    --border: rgba(0, 255, 65, 0.12);
    --font-mono: 'IBM Plex Mono', 'Fira Code', monospace;
  }

  html, body {
    font-family: var(--font-mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.15) 2px,
      rgba(0, 0, 0, 0.15) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* CRT vignette */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .title {
    font-family: 'Fira Code', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--green);
    text-shadow: 0 0 20px var(--green-glow), 0 0 40px var(--green-glow);
    letter-spacing: -0.5px;
  }

  .title .cursor {
    display: inline-block;
    width: 10px;
    height: 20px;
    background: var(--green);
    margin-left: 4px;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .title .prefix {
    color: var(--muted);
    font-weight: 400;
  }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--border);
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .badge-ok {
    color: var(--green);
    border-color: rgba(0,255,65,0.25);
    background: rgba(0,255,65,0.05);
  }

  .badge-ok .dot {
    width: 6px; height: 6px;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse-green 2s ease-in-out infinite;
  }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 4px var(--green); }
    50% { box-shadow: 0 0 12px var(--green), 0 0 20px var(--green-glow); }
  }

  .header-right {
    display: flex;
    align-items: flex-end;
    gap: 16px;
  }

  .select-wrap label {
    display: block;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .select {
    appearance: none;
    background: var(--panel);
    color: var(--green);
    border: 1px solid var(--border);
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 13px;
    min-width: 240px;
  }

  .meta {
    color: var(--muted);
    font-size: 12px;
    padding-bottom: 4px;
  }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 14px 16px;
    position: relative;
  }

  .stat-card::before {
    content: '>';
    position: absolute;
    left: 6px;
    top: 14px;
    color: var(--green);
    font-size: 12px;
    opacity: 0.5;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
    padding-left: 14px;
  }

  .stat-value {
    font-family: 'Fira Code', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--green);
    text-shadow: 0 0 10px var(--green-glow);
    padding-left: 14px;
  }

  /* Depth chart card */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .card-header h3 {
    font-size: 13px;
    font-weight: 500;
    color: var(--green-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn-pause {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid rgba(0,255,65,0.3);
    background: transparent;
    color: var(--green);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .btn-pause:hover {
    background: rgba(0,255,65,0.1);
  }

  /* Mock depth chart */
  .depth-chart {
    height: 380px;
    padding: 20px;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 2px;
  }

  .depth-bid, .depth-ask {
    flex: 1;
    max-width: 40px;
    transition: height 0.3s;
  }

  .depth-bid {
    background: linear-gradient(to top, var(--green), transparent);
    opacity: 0.4;
    border-top: 1px solid var(--green);
  }

  .depth-ask {
    background: linear-gradient(to top, var(--red), transparent);
    opacity: 0.4;
    border-top: 1px solid var(--red);
  }

  /* SVG depth visualization */
  .depth-svg {
    width: 100%;
    height: 380px;
  }

  .bid-area { fill: rgba(0, 255, 65, 0.08); stroke: var(--green); stroke-width: 1.5; }
  .ask-area { fill: rgba(255, 51, 51, 0.08); stroke: var(--red); stroke-width: 1.5; }
  .grid-line { stroke: rgba(0, 255, 65, 0.06); stroke-width: 0.5; }
  .axis-label { fill: var(--muted); font-family: var(--font-mono); font-size: 10px; }
  .glow-bid { filter: drop-shadow(0 0 6px rgba(0, 255, 65, 0.4)); }
  .glow-ask { filter: drop-shadow(0 0 6px rgba(255, 51, 51, 0.4)); }

  /* Footer ticker */
  .ticker {
    margin-top: 20px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  .ticker span { color: var(--green); }

  /* Flicker animation */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.8; }
    94% { opacity: 1; }
    96% { opacity: 0.9; }
    97% { opacity: 1; }
  }

  .page { animation: flicker 8s infinite; }
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="header-left">
      <h1 class="title"><span class="prefix">~/</span>QuantFlow<span class="cursor"></span></h1>
      <div class="badge badge-ok">
        <span class="dot"></span>
        CONNECTED
      </div>
    </div>
    <div class="header-right">
      <div class="select-wrap">
        <label>Instrument</label>
        <select class="select">
          <option>BTCUSDT (id 1)</option>
          <option>ETHUSDT (id 2)</option>
        </select>
      </div>
      <div class="meta">depth: 10</div>
    </div>
  </header>

  <section class="stats">
    <div class="stat-card">
      <div class="stat-label">Spread</div>
      <div class="stat-value">0.0100</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Mid Price</div>
      <div class="stat-value">104,232.55</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Latency</div>
      <div class="stat-value">3 ms</div>
    </div>
  </section>

  <div class="card">
    <div class="card-header">
      <h3>Orderbook Depth</h3>
      <button class="btn-pause">Pause</button>
    </div>
    <svg class="depth-svg" viewBox="0 0 800 380" preserveAspectRatio="none">
      <!-- Grid -->
      <line class="grid-line" x1="0" y1="76" x2="800" y2="76"/>
      <line class="grid-line" x1="0" y1="152" x2="800" y2="152"/>
      <line class="grid-line" x1="0" y1="228" x2="800" y2="228"/>
      <line class="grid-line" x1="0" y1="304" x2="800" y2="304"/>
      <line class="grid-line" x1="400" y1="0" x2="400" y2="380" style="stroke: rgba(0,255,65,0.15);"/>

      <!-- Bid side (left, green) -->
      <g class="glow-bid">
        <path class="bid-area" d="M400,350 L400,280 L360,260 L320,230 L280,190 L240,170 L200,155 L160,150 L120,148 L80,147 L80,350 Z" fill="rgba(0,255,65,0.08)"/>
        <polyline class="bid-area" points="400,280 360,260 320,230 280,190 240,170 200,155 160,150 120,148 80,147" fill="none"/>
      </g>

      <!-- Ask side (right, red) -->
      <g class="glow-ask">
        <path class="ask-area" d="M400,350 L400,285 L440,265 L480,235 L520,200 L560,175 L600,160 L640,152 L680,149 L720,148 L720,350 Z" fill="rgba(255,51,51,0.08)"/>
        <polyline class="ask-area" points="400,285 440,265 480,235 520,200 560,175 600,160 640,152 680,149 720,148" fill="none"/>
      </g>

      <!-- Labels -->
      <text class="axis-label" x="80" y="370">104,228</text>
      <text class="axis-label" x="240" y="370">104,230</text>
      <text class="axis-label" x="380" y="370">mid</text>
      <text class="axis-label" x="540" y="370">104,234</text>
      <text class="axis-label" x="700" y="370">104,236</text>

      <text class="axis-label" x="5" y="308">2.0</text>
      <text class="axis-label" x="5" y="232">4.0</text>
      <text class="axis-label" x="5" y="156">6.0</text>
      <text class="axis-label" x="5" y="80">8.0</text>
    </svg>
  </div>

  <div class="ticker">
    <div>SYS <span>OK</span> | WS <span>LIVE</span> | FEED <span>BINANCE</span></div>
    <div>UPD <span>1,204/s</span> | BUF <span>0</span> | PID <span>48201</span></div>
  </div>
</div>
</body>
</html>
